name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  secrets:
    name: Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Check public repository hygiene
        run: bash ./tests/public-repo-hygiene.sh

      - name: Install Gitleaks
        env:
          GITLEAKS_VERSION: "8.30.1"
          GITLEAKS_ARCHIVE_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
        run: |
          archive="${RUNNER_TEMP}/gitleaks.tar.gz"
          curl --fail --silent --show-error --location \
            --output "$archive" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_ARCHIVE_SHA256}  ${archive}" | sha256sum --check -
          tar -xzf "$archive" -C "$RUNNER_TEMP" gitleaks

      - name: Run Gitleaks
        run: |
          "$RUNNER_TEMP/gitleaks" detect --source . --redact --no-banner --log-opts="--all"

  shell:
    name: Shell and Node (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "22"

      - name: Check syntax
        run: |
          test "$(git ls-files -s -- tests/ai-env-smoke.sh | awk '{ print $1 }')" = "100755"
          test "$(git ls-files -s -- tests/public-repo-hygiene.sh | awk '{ print $1 }')" = "100755"
          bash -n src/shell/cxcc.sh tests/ai-env-smoke.sh tests/public-repo-hygiene.sh
          node --check src/shell/ai-health.mjs

      - name: Test Shell helpers
        run: bash ./tests/ai-env-smoke.sh

  windows:
    name: PowerShell and Bridge
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    env:
      CODEX_CLI_PATH: ""
      CODEX_PROVIDER_BRIDGE_ACTIVE: ""
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: "8.0.x"

      - name: Check PowerShell syntax
        run: |
          $files = @(
            "src/powershell/CxCc/CxCc.ps1"
            "src/powershell/CxCc/Profiles.ps1"
            "src/powershell/CxCc/ToolRuntime.ps1"
            "src/powershell/CxCc/Health.ps1"
            "src/powershell/CxCc/CodexApp.ps1"
            "src/powershell/CxCc/Mcp.ps1"
            "src/powershell/CxCc/Entrypoints.ps1"
            "templates/codex/codex-app-token.ps1"
            "tests/TestProcessEnvironment.ps1"
            "tests/Test-ProcessEnvironmentIsolation.ps1"
            "tests/ai-env-smoke.ps1"
            "tests/ai-env-health.ps1"
            "tests/ai-env-mcp.ps1"
            "tests/codex-all-provider-sessions.ps1"
            "tests/codex-provider-bridge.ps1"
            "tests/codex-app-bridge-management.ps1"
            "tests/powershell-loader.ps1"
            "tests/powershell-profile-smoke.ps1"
          )
          foreach ($file in $files) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($file, [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              $errors | Format-List
              throw "PowerShell syntax check failed: $file"
            }
          }

      - name: Test PowerShell helpers
        run: |
          & ./tests/TestProcessEnvironment.ps1
          & ./tests/ai-env-smoke.ps1
          & ./tests/ai-env-health.ps1
          & ./tests/ai-env-mcp.ps1
          & ./tests/codex-all-provider-sessions.ps1
          & ./tests/powershell-loader.ps1
          & ./tests/powershell-profile-smoke.ps1

      - name: Test process environment isolation
        run: "& ./tests/Test-ProcessEnvironmentIsolation.ps1"

      - name: Build Bridge
        run: dotnet build ./src/bridge/CodexProviderBridge/CodexProviderBridge.csproj --configuration Release

      - name: Test Bridge
        run: |
          & ./tests/codex-provider-bridge.ps1
          & ./tests/codex-app-bridge-management.ps1
